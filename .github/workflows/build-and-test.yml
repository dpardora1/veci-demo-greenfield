name: Build and test

# Runs on every PR and every push to main, regardless of which paths changed.
# Rationale: this check is REQUIRED by branch protection. Using path filters
# leaves docs-only PRs with mergeStateStatus=BLOCKED because the check never
# fires (cierra GAP-2026-0012). The build is cheap enough to run on docs PRs;
# this also guarantees that any drift between docs and code is caught early.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore greenfield-checkout.slnx

      - name: Build
        run: dotnet build greenfield-checkout.slnx --no-restore --configuration Release

      - name: Test (Domain)
        run: dotnet test tests/Domain.UnitTests/Domain.UnitTests.csproj --no-build --configuration Release --logger "trx;LogFileName=Domain.trx" --results-directory TestResults

      - name: Test (Application)
        run: dotnet test tests/Application.UnitTests/Application.UnitTests.csproj --no-build --configuration Release --logger "trx;LogFileName=Application.trx" --results-directory TestResults

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/*.trx
